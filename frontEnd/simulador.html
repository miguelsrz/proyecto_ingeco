<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador Solar – Cundinamarca</title>
  <!-- Tailwind via CDN (desarrollo). Para CLI en producción ver comentario en README -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <nav class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center">
    <span class="font-bold">☀️ Simulador Solar</span>
    <div class="flex gap-6 text-sm">
      <a href="index.html" class="hover:text-yellow-300">Inicio</a>
      <a href="simulador.html" class="hover:text-yellow-300">Simulador</a>
    </div>
  </nav>

  <main class="max-w-xl mx-auto px-6 py-12 flex-1 w-full">

    <!-- Formulario -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8 mb-6">
      <h1 class="text-xl font-bold text-blue-900 mb-6">Parámetros del Proyecto</h1>

      <!-- Ciudad fija: Bogota (unica por ahora) -->
      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Ciudad</label>
        <input type="text" value="Bogota" disabled
               class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-400"/>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
          Area disponible (m2)
        </label>
        <input type="number" id="area_m2" value="300" min="1"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-600"/>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">
          Costo de instalacion (COP)
        </label>
        <input type="number" id="costo_instalacion" value="150000000" min="1"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-600"/>
      </div>

      <p id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200
                               rounded-lg px-4 py-2 mb-4"></p>

      <button id="btnCalcular" onclick="calcular()"
              class="w-full bg-blue-800 hover:bg-blue-700 text-white font-bold
                     py-3 rounded-xl transition disabled:opacity-50">
        Calcular
      </button>
    </div>

    <!-- Resultados -->
    <div id="resultados" class="hidden bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
      <h2 class="text-lg font-bold text-blue-900 mb-5">Resultado</h2>
      <div id="kpiGrid" class="grid grid-cols-2 gap-4"></div>
    </div>

  </main>

  <footer class="text-center text-xs text-slate-400 py-5 border-t border-slate-200">
    Universidad Nacional de Colombia · Facultad de Ingenieria · 2026-1S
  </footer>

  <script src="/js/simulador.js"></script>
</body>
</html>
